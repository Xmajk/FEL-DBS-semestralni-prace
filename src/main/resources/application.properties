spring.application.name=semestralniPraceDBS

# PostgreSQL connection — upravte podle lokálního prostředí
spring.datasource.url=jdbc:postgresql://slon.felk.cvut.cz:5432/hroudmi5
spring.datasource.username=hroudmi5
spring.datasource.password=heslo
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Zakáže webový server — aplikace poběží jako CLI
spring.main.web-application-type=none
